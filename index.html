<html class="light" lang="pt-BR">
<head>

                    "tertiary-fixed": "#ffdea1",
                    "surface-container-high": "#e5e8f0",

    <style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
        
        /* Subtle animated gradient background for the non-image area on desktop */
        .animated-bg {
            background: linear-gradient(-45deg, #f8f9ff, #f0f4fb, #e5e8f0, #ffffff);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>

<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center font-body-md animated-bg relative overflow-hidden">
    <!-- Form Section (Centered) -->
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg border border-surface-variant p-8 md:p-10 z-10">
        <!-- Brand Logo -->
        <div class="text-center mb-10">
            <h1 class="font-headline-lg text-headline-lg font-extrabold text-data-red tracking-tight">RED BALLOON EXECUTIVE</h1>
        </div>
        <!-- Form Header -->
        <div class="mb-8">
            <h2 class="font-headline-md text-headline-md text-text-primary mb-2">Portal de Gestão</h2>
            <p class="font-body-md text-body-md text-text-muted">Acesse o Painel de Resultados</p>
        </div>
        
        <!-- Alert Container -->
        <div id="alert-container" class="hidden mb-6 rounded-lg p-4 text-sm font-medium border transition-all duration-200"></div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-6">
            <!-- Email Input -->
            <div>
                <label class="block font-label-md text-label-md text-text-muted mb-2" for="email">E-mail corporativo</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-text-muted text-[20px]">mail</span>
                    </div>
                    <input class="block w-full pl-10 pr-3 py-3 border border-surface-variant rounded-lg bg-surface focus:ring-2 focus:ring-data-blue focus:border-data-blue transition-colors text-text-primary placeholder-text-muted/50 font-body-md" id="email" name="email" placeholder="nome@redballoon.com.br" required="" type="email"/>
                </div>
            </div>
            <!-- Password Input -->
            <div>
                <label class="block font-label-md text-label-md text-text-muted mb-2" for="password">Senha</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-text-muted text-[20px]">lock</span>
                    </div>
                    <input class="block w-full pl-10 pr-10 py-3 border border-surface-variant rounded-lg bg-surface focus:ring-2 focus:ring-data-blue focus:border-data-blue transition-colors text-text-primary placeholder-text-muted/50 font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
                    <!-- Toggle Password Visibility -->
                    <button class="absolute inset-y-0 right-0 pr-3 flex items-center text-text-muted hover:text-data-blue transition-colors focus:outline-none" type="button" id="toggle-password">
                        <span class="material-symbols-outlined text-[20px]" id="password-toggle-icon">visibility_off</span>
                    </button>
                </div>
            </div>
            <!-- Actions Row -->
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input class="h-4 w-4 text-data-blue focus:ring-data-blue border-surface-variant rounded" id="remember-me" name="remember-me" type="checkbox"/>
                    <label class="ml-2 block font-body-md text-body-md text-text-muted" for="remember-me">
                        Lembrar de mim
                    </label>
                </div>
                <div class="text-sm">
                    <a class="font-label-md text-label-md text-data-blue hover:text-secondary transition-colors" href="#">
                        Esqueci minha senha
                    </a>
                </div>
            </div>
            <!-- Submit Button -->
            <div>
                <button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-white bg-data-red hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-data-red transition-all duration-200 transform hover:-translate-y-0.5 uppercase tracking-wide disabled:opacity-50 disabled:cursor-not-allowed" type="submit" id="submit-btn">
                    <span id="submit-text">Entrar</span>
                    <span class="material-symbols-outlined ml-2 text-[20px]" id="submit-icon">login</span>
                </button>
            </div>
        </form>
        <!-- Help Link -->
        <div class="mt-8 text-center">
            <p class="font-body-md text-body-md text-text-muted text-sm">
                Problemas com o acesso? <a class="text-data-blue hover:underline" href="#">Contate o suporte de TI</a>
            </p>
        </div>
        <!-- Version Info -->
        <div class="mt-6 pt-6 border-t border-surface-variant text-center text-[11px] text-text-muted/70">
            <strong>Versão 1.5</strong> - Banco de dados
        </div>
    </div>
    <!-- Subtle background decorative elements -->
    <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 rounded-full bg-data-blue/5 blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 -ml-16 -mb-16 w-48 h-48 rounded-full bg-data-red/5 blur-3xl pointer-events-none"></div>
</body>
</html>
